# MacSweep landing page — nginx server block.
#
# Drop this in /etc/nginx/sites-available/macsweep on the Lightsail box,
# then symlink and reload:
#
#   sudo cp build/nginx-macsweep.conf /etc/nginx/sites-available/macsweep
#   sudo ln -sf /etc/nginx/sites-available/macsweep /etc/nginx/sites-enabled/macsweep
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS prerequisite: the polistician.ai zone must have an A record for
# macsweep pointing to 18.153.234.151. Cloudflare → DNS → add CNAME or A
# row. Same setup as voicetype.polistician.ai.
#
# SSL: reuses the wildcard cert already on the box (the same one voicetype
# uses). If the cert isn't a wildcard, get one for macsweep.polistician.ai
# via certbot before reloading nginx.

server {
    listen 80;
    server_name macsweep.polistician.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name macsweep.polistician.ai;

    ssl_certificate     /etc/ssl/certs/polistician-ai.crt;
    ssl_certificate_key /etc/ssl/private/polistician-ai.key;

    root /opt/crypto-app/apps/macsweep;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for static assets — content-hashed via release.sh
    # would be ideal, but for now use a moderate cache + forced revalidate
    # on the HTML so the version pill updates with releases.
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
}
